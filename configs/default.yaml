data:
  cumulative_path: data/raw/cumulative-exoplanets.xlsx
  habitable_path: data/raw/habitable_planets_detailed_list.xlsx
  non_habitable_path: data/raw/non_habitable_planets_confirmed_detailed_list.xlsx
  cumulative_sheet_name: cumulative
  id_column: kepoi_name
  target_column: habitable?

features:
  - koi_period
  - koi_ror
  - koi_srho
  - koi_prad
  - koi_sma
  - koi_teq
  - koi_insol
  - koi_dor
  - koi_count
  - koi_steff
  - koi_slogg
  - koi_smet
  - koi_srad
  - koi_smass
  - koi_eccen

preprocessing:
  outlier_rules:
    koi_smass: 1.5
    koi_prad: 2.0

split:
  test_size: 0.2
  random_seed: 42

model_selection:
  cv_folds: 5
  scoring: f1_macro
  n_jobs: -1

models:
  dummy:
    enabled: true
    strategy: most_frequent
  logistic_elasticnet:
    enabled: true
    param_grid:
      classifier__C: [0.1, 1.0, 10.0]
      classifier__l1_ratio: [0.5]
  svm_rbf:
    enabled: true
    param_grid:
      classifier__C: [1.0, 10.0]
      classifier__gamma: [0.01, 0.1]
  random_forest:
    enabled: true
    param_grid:
      classifier__n_estimators: [100]
      classifier__max_depth: [5, 10]
      classifier__min_samples_split: [2, 5]
      classifier__max_features: ["sqrt"]
  gradient_boosting:
    enabled: true
    param_grid:
      classifier__n_estimators: [100]
      classifier__learning_rate: [0.05, 0.1]
      classifier__max_depth: [2, 3]
  xgboost:
    enabled: true
    param_grid:
      classifier__n_estimators: [100]
      classifier__max_depth: [2, 3]
      classifier__learning_rate: [0.05, 0.1]
  logistic_l1:
    enabled: false
    param_grid:
      classifier__C: [0.1, 1.0, 10.0]
  logistic_l2:
    enabled: false
    param_grid:
      classifier__C: [0.1, 1.0, 10.0]
  svm_linear:
    enabled: false
    param_grid:
      classifier__C: [0.1, 1.0, 10.0]
  svm_poly:
    enabled: false
    param_grid:
      classifier__C: [1.0, 10.0]
      classifier__degree: [2]
      classifier__gamma: ["auto"]

outputs:
  reports_dir: reports
  figures_dir: figures
